<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>riiimparm/html</title>

<style>
:root{
  --bg:#0d1117;
  --card:#161b22;
  --border:#30363d;
  --text:#e6edf3;
  --sub:#8b949e;
  --link:#58a6ff;
}

body{
  margin:0;
  padding:2rem;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

h1{
  margin-top:0;
}

.desc{
  color:var(--sub);
  margin-bottom:2rem;
}

.list{
  display:grid;
  gap:1rem;
}

.card{
  display:block;
  text-decoration:none;
  color:inherit;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1rem;
}

.card:hover{
  border-color:var(--link);
}

.title{
  color:var(--link);
  font-weight:600;
  font-size:1.1rem;
}

.description{
  margin-top:.5rem;
  color:var(--sub);
}

.path{
  margin-top:.5rem;
  font-size:.85rem;
  color:var(--sub);
}
</style>
</head>
<body>

<h1>riiimparm/html</h1>
<p class="desc">GitHub Pages 公開コンテンツ一覧</p>

<div id="list" class="list"></div>

<script>
async function loadTools() {
  try {
    const response = await fetch("./tools.json");
    const tools = await response.json();

    const list = document.getElementById("list");

    tools.forEach(tool => {
      const card = document.createElement("a");
      card.className = "card";
      card.href = tool.url;

      card.innerHTML = `
        <div class="title">${tool.title}</div>
        <div class="description">${tool.description ?? ""}</div>
        <div class="path">${tool.url}</div>
      `;

      list.appendChild(card);
    });
  } catch (e) {
    document.getElementById("list").innerHTML =
      "<p>tools.json の読み込みに失敗しました。</p>";
    console.error(e);
  }
}

loadTools();
</script>

</body>
</html>
