<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineer Tools Gallery - Masonry Layout</title>
    <style>
        /* --- 共通スタイル (変更なし) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0a;
            color: #f5f5f5;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px);
            z-index: 1000;
            padding: 15px 40px;
            border-bottom: 1px solid #222;
        }
        .header-content {
            max-width: 100%; margin: 0 auto; display: flex;
            justify-content: space-between; align-items: center;
        }
        h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; color: #fff; }
        .controls { display: flex; gap: 10px; align-items: center; }
        input[type="text"] {
            background: #1a1a1a; border: 1px solid #333; color: #f5f5f5;
            padding: 8px 12px; font-size: 13px; border-radius: 6px;
            width: 180px; transition: all 0.3s;
        }
        .filter-btn {
            background: transparent; border: 1px solid #333; color: #aaa;
            padding: 6px 14px; cursor: pointer; font-size: 13px;
            transition: all 0.2s; border-radius: 6px;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #fff; color: #000; border-color: #fff;
        }
        .main-layout { display: flex; margin-top: 70px; height: calc(100vh - 70px); }
        .gallery-container { flex: 1; padding: 30px; overflow-y: auto; }

        /* --- Masonry Grid レイアウトの定義 (変更点) --- */
        .gallery {
            display: grid;
            /* 基本のカラム幅を定義。画面幅に応じて列数が変わる */
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            /* 基本の行の高さを定義 */
            grid-auto-rows: 140px;
            gap: 15px;
            /* 重要: 空いたスペースを自動的に詰めて配置する */
            grid-auto-flow: dense;
        }

        /* ギャラリーアイテムの基本スタイル (変更点) */
        .gallery-item {
            position: relative;
            /* aspect-ratio は削除し、グリッドのセルサイズに委ねる */
            overflow: hidden;
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #222;
            cursor: pointer;
            transition: border-color 0.3s, opacity 0.4s, transform 0.4s;
            opacity: 1;
            
            /* デフォルトサイズ (1x1) */
            grid-column: span 1;
            grid-row: span 1;
        }

        /* --- サイズバリエーションの定義 (新規追加) --- */
        /* 横長 (2列 x 1行) */
        .gallery-item.item-wide {
            grid-column: span 2;
        }
        /* 縦長 (1列 x 2行) */
        .gallery-item.item-tall {
            grid-row: span 2;
        }
        /* 大型 (2列 x 2行) */
        .gallery-item.item-large {
            grid-column: span 2;
            grid-row: span 2;
        }

        /* フィルタリング時のアニメーション用 */
        .gallery-item.fade-out {
            opacity: 0;
            transform: scale(0.9); /* フェードアウト時に少し縮小 */
            pointer-events: none;
        }

        .gallery-item:hover {
            border-color: #007aff;
            box-shadow: 0 0 20px rgba(0, 122, 255, 0.2);
            z-index: 1; /* ホバー時に他の要素より前に出す */
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        /* --- その他のスタイル (変更なし) --- */
        .item-name-layer {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px);
            padding: 8px 12px; font-size: 12px; font-weight: 600;
            color: #fff; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar {
            width: 350px; background: #111; border-left: 1px solid #222;
            padding: 40px 30px; display: flex; flex-direction: column;
            gap: 20px; position: sticky; top: 70px; height: calc(100vh - 70px); overflow-y: auto;
        }
        #detail-content { transition: opacity 0.3s; }
        .detail-category { font-size: 11px; text-transform: uppercase; color: #007aff; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        .detail-title { font-size: 24px; font-weight: 700; margin-bottom: 15px; }
        .detail-description { font-size: 14px; line-height: 1.6; color: #ccc; margin-bottom: 20px; }
        .info-grid { display: grid; gap: 15px; }
        .info-item { border-top: 1px solid #222; padding-top: 10px; }
        .info-label { font-size: 11px; color: #666; margin-bottom: 4px; }
        .info-value { font-size: 13px; color: #eee; }
        .placeholder-text { color: #444; font-style: italic; text-align: center; margin-top: 50px; }
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; height: auto; }
            .sidebar { width: 100%; border-left: none; border-top: 1px solid #222; position: static; height: auto; }
            /* モバイル時はグリッドのカラム幅を調整 */
            .gallery { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); grid-auto-rows: 120px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>DEV_TOOLS GALLERY</h1>
            <div class="controls">
                <input type="text" id="searchInput" placeholder="Search tools...">
                <button class="filter-btn active" data-category="all">All</button>
                <button class="filter-btn" data-category="Editor">Editor</button>
                <button class="filter-btn" data-category="Terminal">Terminal</button>
                <button class="filter-btn" data-category="AI">AI</button>
                <button class="filter-btn" data-category="Network">Network</button>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div class="gallery-container">
            <div class="gallery" id="gallery"></div>
        </div>

        <aside class="sidebar" id="sidebar">
            <div id="detail-content">
                <p class="placeholder-text">Hover over a tool to see details</p>
            </div>
        </aside>
    </div>

    <script>
        // データに 'size' プロパティを追加してユニークな配置を定義
        // size: 'small' (1x1), 'wide' (2x1), 'tall' (1x2), 'large' (2x2)
        const tools = [
            { id: 1, title: "VS Code", category: "Editor", author: "Microsoft", desc: "世界で最も人気のあるコードエディタ。豊富な拡張機能が特徴です。", url: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=600", size: "large" },
            { id: 2, title: "iTerm2", category: "Terminal", author: "George Nachman", desc: "macOS用の高度なターミナルエミュレータ。画面分割や検索機能が強力です。", url: "https://images.unsplash.com/photo-1629654297299-c8506221ca97?w=600", size: "tall" },
            { id: 3, title: "ChatGPT", category: "AI", author: "OpenAI", desc: "コーディングのペアプログラミングやリサーチに欠かせないAIアシスタント。", url: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=600", size: "small" },
            { id: 4, title: "Wireshark", category: "Network", author: "Gerald Combs", desc: "ネットワークプロトコルアナライザ。パケットの詳細な解析に使用します。", url: "https://images.unsplash.com/photo-1558494949-ef010cbdcc51?w=600", size: "wide" },
            { id: 5, title: "Neovim", category: "Editor", author: "Community", desc: "拡張性と構成の自由度を追求した、Vimベースのエディタ。", url: "https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=600", size: "small" },
            { id: 6, title: "Postman", category: "Network", author: "Postman Inc", desc: "API開発のためのプラットフォーム。リクエストのテストやドキュメント化に最適。", url: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=600", size: "tall" },
            { id: 7, title: "Claude", category: "AI", author: "Anthropic", desc: "高い文脈理解能力を持つAI。自然な対話と論理的思考に優れています。", url: "https://images.unsplash.com/photo-1675271591211-126ad94e495d?w=600", size: "wide" },
            { id: 8, title: "Docker", category: "Terminal", author: "Docker Inc", desc: "コンテナ仮想化技術。環境構築の簡略化とポータビリティを提供します。", url: "https://images.unsplash.com/photo-1605745341112-85968b193ef5?w=600", size: "small" },
            { id: 17, title: "Terraform", category: "Infrastructure", author: "HashiCorp", desc: "コードでインフラを管理するIaCツール。クラウドのリソースを宣言的に定義・構築できます。", url: "https://picsum.photos/600/400", size: "large" },
    { id: 18, title: "Kubernetes", category: "Infrastructure", author: "Cloud Native Computing Foundation", desc: "コンテナのデプロイ、スケーリング、管理を自動化するオーケストレーションシステム。", url: "https://picsum.photos/400/600", size: "tall" },
    { id: 19, title: "Sentry", category: "Monitoring", author: "Functional Software, Inc.", desc: "リアルタイムのエラー追跡プラットフォーム。バグの特定と修正を迅速化します。", url: "https://picsum.photos/400/400", size: "small" },
    { id: 20, title: "Grafana", category: "Monitoring", author: "Grafana Labs", desc: "メトリクスを可視化するオープンソース・ダッシュボード。データの監視に最適です。", url: "https://picsum.photos/800/400", size: "wide" },
    { id: 21, title: "Obsidian", category: "Knowledge", author: "Dynalist Inc.", desc: "ローカルのMarkdownファイルを活用する知識管理ツール。思考のネットワークを構築できます。", url: "https://picsum.photos/400/400", size: "small" },
    { id: 22, title: "Warp", category: "Terminal", author: "Warp AI", desc: "AIを搭載したモダンなターミナル。共同作業やワークフローの保存が可能です。", url: "https://picsum.photos/400/600", size: "tall" },
    { id: 23, title: "Insomnia", category: "Network", author: "Kong", desc: "直感的な操作が可能なAPIクライアント。GraphQLやgRPCのテストにも対応しています。", url: "https://picsum.photos/800/400", size: "wide" },
    { id: 24, title: "Vercel", category: "Cloud", author: "Vercel Inc.", desc: "フロントエンドのためのクラウドプラットフォーム。デプロイの自動化と高速な配信を提供します。", url: "https://picsum.photos/600/400", size: "large" },
    { id: 25, title: "Tailwind CSS", category: "Design", author: "Tailwind Labs", desc: "ユーティリティファーストのCSSフレームワーク。HTMLを離れずに高速にデザインを構築できます。", url: "https://picsum.photos/400/400", size: "small" },
    { id: 26, title: "Vite", category: "Build Tool", author: "Evan You", desc: "次世代のフロントエンドビルドツール。驚異的な速さのHMR（Hot Module Replacement）を実現します。", url: "https://picsum.photos/400/600", size: "tall" },
    { id: 27, title: "Bitwarden", category: "Security", author: "8bit Solutions", desc: "オープンソースのパスワード管理ツール。強固な暗号化で資格情報を安全に保護します。", url: "https://picsum.photos/800/400", size: "wide" },
    { id: 28, title: "Trello", category: "Management", author: "Atlassian", desc: "カンバン方式のタスク管理ツール。視覚的にプロジェクトの進捗を把握できます。", url: "https://picsum.photos/400/400", size: "small" },
    { id: 29, title: "Burp Suite", category: "Security", author: "PortSwigger", desc: "Webアプリケーションの脆弱性診断ツール。ペネトレーションテストの業界標準です。", url: "https://picsum.photos/600/400", size: "large" },
    { id: 30, title: "Raycast", category: "Productivity", author: "Raycast", desc: "macOS用のランチャーアプリ。計算、スクリプト実行、ウィンドウ管理を瞬時に行えます。", url: "https://picsum.photos/400/400", size: "small" }
        ];

        const gallery = document.getElementById('gallery');
        const detailContent = document.getElementById('detail-content');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');

        // サイドバー更新関数 (変更なし)
        function updateSidebar(tool) {
            if (!tool) return;
            detailContent.style.opacity = '0';
            setTimeout(() => {
                detailContent.innerHTML = `
                    <span class="detail-category">${tool.category}</span>
                    <h2 class="detail-title">${tool.title}</h2>
                    <p class="detail-description">${tool.desc}</p>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Developer</div>
                            <div class="info-value">${tool.author}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Status</div>
                            <div class="info-value">Recommended</div>
                        </div>
                    </div>
                `;
                detailContent.style.opacity = '1';
            }, 150);
        }

        // ギャラリー描画関数 (変更あり)
        function renderGallery(filterCategory = 'all', searchTerm = '') {
            // 初回ロード時のみアイテムを生成
            if (gallery.innerHTML === '') {
                tools.forEach(tool => {
                    const item = document.createElement('div');
                    // サイズに応じたクラスを付与 (item-large, item-wide など)
                    item.className = `gallery-item item-${tool.size}`;
                    item.dataset.category = tool.category;
                    item.dataset.id = tool.id;
                    item.innerHTML = `
                        <img src="${tool.url}" alt="${tool.title}">
                        <div class="item-name-layer">${tool.title}</div>
                    `;
                    item.addEventListener('mouseenter', () => updateSidebar(tool));
                    gallery.appendChild(item);
                });
            }

            // フィルタリング処理
            const allItems = document.querySelectorAll('.gallery-item');
            allItems.forEach(item => {
                const tool = tools.find(t => t.id == item.dataset.id);
                const matchesFilter = filterCategory === 'all' || tool.category === filterCategory;
                const matchesSearch = tool.title.toLowerCase().includes(searchTerm.toLowerCase());

                if (matchesFilter && matchesSearch) {
                    // 表示処理: まず display を block にしてからフェードイン
                    item.style.display = 'block';
                    // 少し遅延させてクラスを削除することでトランジションを効かせる
                    requestAnimationFrame(() => {
                        item.classList.remove('fade-out');
                    });
                } else {
                    // 非表示処理: フェードアウトクラスを追加
                    item.classList.add('fade-out');
                    // トランジション完了後に display を none にする
                    setTimeout(() => {
                        if (item.classList.contains('fade-out')) {
                            item.style.display = 'none';
                        }
                    }, 400); // CSSのtransition時間と合わせる
                }
            });
        }

        // イベントリスナー設定 (変更なし)
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGallery(btn.dataset.category, searchInput.value);
            });
        });

        searchInput.addEventListener('input', (e) => {
            const activeBtn = document.querySelector('.filter-btn.active');
            renderGallery(activeBtn.dataset.category, e.target.value);
        });

        // 初期表示
        renderGallery();
    </script>
</body>
</html>
