<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none';">
<title>tf-plan analyzer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f0f;
  --bg2: #181818;
  --bg3: #222;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #e8e8e8;
  --text2: #888;
  --text3: #555;
  --mono: 'JetBrains Mono', 'Fira Mono', 'Cascadia Code', monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --red: #e05252;
  --red-bg: rgba(224,82,82,0.1);
  --green: #4caf7d;
  --green-bg: rgba(76,175,125,0.1);
  --amber: #e0a34c;
  --amber-bg: rgba(224,163,76,0.1);
  --blue: #5b9cf6;
  --blue-bg: rgba(91,156,246,0.1);
  /* operation colors */
  --c-create:  #4caf7d;
  --c-update:  #5b9cf6;
  --c-replace: #e0a34c;
  --c-destroy: #e05252;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  padding: 2rem 1.5rem;
}

.container { max-width: 860px; margin: 0 auto; }

header { margin-bottom: 2rem; }
header h1 {
  font-family: var(--mono);
  font-size: 1.1rem;
  font-weight: 400;
  color: var(--text2);
  letter-spacing: 0.02em;
}
header h1 span { color: var(--green); }

.local-notice {
  font-size: 0.72rem;
  color: var(--text3);
  font-family: var(--mono);
  margin-bottom: 0.75rem;
  letter-spacing: 0.01em;
}

.local-notice {
  font-size: 0.73rem;
  color: var(--text3);
  font-family: var(--mono);
  margin-bottom: 0.6rem;
  display: flex;
  align-items: center;
  gap: 6px;
}
.local-icon { color: var(--c-create); font-size: 0.8rem; }

.drop-zone {
  border: 1px dashed var(--border2);
  border-radius: 8px;
  padding: 2rem;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  margin-bottom: 1rem;
  background: var(--bg2);
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--green);
  background: rgba(76,175,125,0.05);
}
.drop-zone p { font-size: 0.85rem; color: var(--text2); }
.drop-zone p + p { margin-top: 4px; font-size: 0.75rem; color: var(--text3); }

textarea {
  display: none;
  width: 100%;
  min-height: 200px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--text);
  resize: vertical;
  outline: none;
  margin-bottom: 1rem;
  line-height: 1.6;
}
textarea:focus { border-color: var(--border2); }
textarea.visible { display: block; }

.btn-row { display: flex; gap: 8px; margin-bottom: 2rem; flex-wrap: wrap; }
button {
  font-family: var(--mono);
  font-size: 0.8rem;
  padding: 8px 16px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
  display: flex;
  align-items: center;
  gap: 6px;
}
button:hover { background: var(--bg3); }
button.primary {
  background: var(--green);
  color: #000;
  border-color: transparent;
  font-weight: 600;
}
button.primary:hover { background: #3da068; }

#results { display: none; }
#results.visible { display: block; }
#resource-list { position: relative; }

.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 1.5rem;
}
@media (max-width: 520px) { .summary-grid { grid-template-columns: repeat(2,1fr); } }

.metric {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  text-align: center;
}
.metric-label { font-size: 0.7rem; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.04em; }
.metric-val { font-family: var(--mono); font-size: 1.8rem; font-weight: 600; }
.metric-val.red { color: var(--red); }
.metric-val.green { color: var(--green); }
.metric-val.amber { color: var(--amber); }
.metric-val.blue { color: var(--blue); }

.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.section-header .label {
  font-size: 0.7rem;
  color: var(--text3);
  font-family: var(--mono);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.section-header hr { flex: 1; border: none; border-top: 1px solid var(--border); }

.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 20; padding: 6px 0; }
.filter-btn {
  font-size: 0.75rem;
  padding: 5px 12px;
  border-radius: 4px;
}
.filter-btn.active                          { background: var(--bg3); border-color: var(--border2); color: var(--text); }
.filter-btn.active[data-filter="create"]    { border-color: var(--c-create);  color: var(--c-create); }
.filter-btn.active[data-filter="update"]    { border-color: var(--c-update);  color: var(--c-update); }
.filter-btn.active[data-filter="replace"]   { border-color: var(--c-replace); color: var(--c-replace); }
.filter-btn.active[data-filter="destroy"]   { border-color: var(--c-destroy); color: var(--c-destroy); }
.filter-btn.active[data-filter="all"]       { border-color: var(--border2);   color: var(--text); }
.copy-btn { margin-left: auto; font-size: 0.72rem; padding: 5px 10px; }

.resource-list { font-family: var(--mono); }
.resource-item {
  display: grid;
  grid-template-columns: 130px 1fr;
  gap: 12px;
  align-items: start;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.82rem;
}
.resource-item:last-child { border-bottom: none; }

.badge {
  font-size: 0.68rem;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 0.03em;
  white-space: nowrap;
  display: inline-block;
}
.badge.replace { background: rgba(224,163,76,0.1); color: var(--c-replace); border: 1px solid rgba(224,163,76,0.25); }
.badge.create  { background: rgba(76,175,125,0.1); color: var(--c-create);  border: 1px solid rgba(76,175,125,0.25); }
.badge.destroy { background: rgba(224,82,82,0.1);  color: var(--c-destroy); border: 1px solid rgba(224,82,82,0.25); }
.badge.update  { background: rgba(91,156,246,0.1); color: var(--c-update);  border: 1px solid rgba(91,156,246,0.25); }

.resource-name { color: var(--text); word-break: break-all; line-height: 1.5; }
.resource-reason { font-size: 0.72rem; color: var(--text3); margin-top: 2px; }
.resource-reason span { color: var(--amber); }

.res-tree { line-height: 1.7; font-size: 0.8rem; }
.mod-kw  { color: var(--text3); }
.mod-seg { color: #7c9cbf; }
.res-leaf { display: flex; align-items: baseline; white-space: pre; font-size: 0.82rem; }
.res-leaf-index { white-space: pre; }
.res-indent { color: var(--text3); user-select: none; }
.res-indent-pad { user-select: none; }
.res-rtype { color: var(--text2); }
.res-dot   { color: var(--text3); }
.res-rname { color: var(--text); font-weight: 500; }
.res-index { color: var(--amber); }

.grp-header {
  padding: 10px 0 4px;
  border-top: 1px solid var(--border2);
  font-family: var(--mono);
  font-size: 0.8rem;
  line-height: 1.6;
  position: sticky;
  top: 40px;
  background: var(--bg);
  z-index: 10;
}
.grp-header:first-child { border-top: none; }
.grp-header-root { padding-top: 6px; }
.grp-mod-line { white-space: pre; }
.grp-pad { user-select: none; }
.grp-root { color: var(--text3); font-size: 0.78rem; }

.grp-type-header {
  font-family: var(--mono);
  font-size: 0.78rem;
  white-space: pre;
  padding: 3px 0 1px;
  color: var(--text2);
  position: sticky;
  top: 78px;
  background: var(--bg);
  z-index: 9;
}

.grp-body { padding-left: 0; margin-bottom: 4px; }
.grp-item {
  display: block;
  padding: 3px 0 3px 12px;
  border-left: 1px solid var(--border);
}
.grp-item-name-header,
.grp-item-index {
  padding-top: 2px;
  padding-bottom: 2px;
  border-left-color: transparent;
}
.grp-item-name { font-family: var(--mono); }

.empty-state { color: var(--text3); font-size: 0.82rem; padding: 16px 0; font-family: var(--mono); }

.attr-block {
  display: none;
  margin: 4px 0 2px 0;
  border-left: 2px solid var(--border2);
  padding-left: 10px;
  font-family: var(--mono);
  font-size: 0.74rem;
  line-height: 1.7;
}
.attr-block.visible { display: block; }
.attr-row {
  display: flex;
  gap: 6px;
  align-items: baseline;
  flex-wrap: wrap;
  padding: 1px 0;
}
.attr-key     { color: var(--text2); flex-shrink: 0; }
.attr-from    { color: var(--c-destroy); opacity: 0.8; word-break: break-all; }
.attr-arrow   { color: var(--text3); flex-shrink: 0; }
.attr-to      { color: var(--c-create); word-break: break-all; }
.attr-val     { color: var(--text2); word-break: break-all; }
.attr-unknown { color: var(--text3); }
.attr-forces  { color: var(--c-replace); font-size: 0.68rem; }
.attr-bracket { color: var(--text3); }
.attr-hcl-line { display: block; }
.attr-hcl-pad  { user-select: none; white-space: pre; }
.attr-hcl-key  { color: var(--text2); }
.attr-hcl-eq   { color: var(--text3); }
.attr-tag-badge {
  font-size: 0.62rem;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 3px;
  background: rgba(91,156,246,0.12);
  color: var(--c-update);
  border: 1px solid rgba(91,156,246,0.2);
  letter-spacing: 0.03em;
  flex-shrink: 0;
  align-self: center;
}

footer { margin-top: 3rem; font-size: 0.72rem; color: var(--text3); font-family: var(--mono); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>$ tf-plan <span>analyzer</span></h1>
  </header>

  <div class="local-notice">すべての処理はブラウザ内で完結します。データは外部に送信されません。</div>

  <div class="drop-zone" id="drop-zone">
    <p>terraform plan の出力を貼り付け / ファイルをドロップ</p>
    <p>クリックでテキスト入力エリアを開く</p>
  </div>

  <textarea id="plan-input" placeholder="ここに terraform plan の出力を貼り付けてください...

推奨:
  terraform plan -out=plan.tfplan
  terraform show -no-color plan.tfplan"></textarea>

  <div class="btn-row">
    <button class="primary" id="analyze-btn">▶ 解析</button>
    <button id="sample-btn">~ サンプル</button>
    <button id="clear-btn">✕ クリア</button>
  </div>

  <div id="results">
    <div class="summary-grid">
      <div class="metric"><div class="metric-label">CREATE</div><div class="metric-val" style="color:var(--c-create)" id="cnt-create">0</div></div>
      <div class="metric"><div class="metric-label">UPDATE</div><div class="metric-val" style="color:var(--c-update)" id="cnt-update">0</div></div>
      <div class="metric"><div class="metric-label">DESTROY → CREATE</div><div class="metric-val" style="color:var(--c-replace)" id="cnt-replace">0</div></div>
      <div class="metric"><div class="metric-label">DESTROY</div><div class="metric-val" style="color:var(--c-destroy)" id="cnt-destroy">0</div></div>
    </div>

    <div class="section-header">
      <span class="label">resources</span>
      <hr>
    </div>

    <div class="filter-row" id="filter-row">
      <button class="filter-btn active" data-filter="create">create</button>
      <button class="filter-btn" data-filter="update">update</button>
      <button class="filter-btn" data-filter="replace">destroy→create</button>
      <button class="filter-btn" data-filter="destroy">destroy</button>
      <button class="filter-btn" data-filter="all">all</button>
      <button class="copy-btn" id="expand-btn">⊞ 属性展開</button>
    </div>

    <div class="resource-list" id="resource-list"></div>
  </div>


</div>

<script>
const SAMPLE = `Terraform will perform the following actions:

  # aws_instance.web must be replaced
  -/+ resource "aws_instance" "web" {
      ~ ami           = "ami-0abcdef1234567890" -> "ami-0987654321fedcba" # forces replacement
      ~ instance_type = "t3.micro" -> "t3.small"
      + tags           = { "Env" = "prod" }
    }

  # aws_security_group.allow_http must be replaced
  -/+ resource "aws_security_group" "allow_http" {
      ~ name = "allow_http" -> "allow_http_v2" # forces replacement
      ~ description = "old desc" -> "new desc"
    }

  # aws_cloudformation_stack_set_instance.resource_explorer["us-east-1"] must be replaced
  -/+ resource "aws_cloudformation_stack_set_instance" "resource_explorer" {
      ~ account_id = "123456789012" -> "210987654321" # forces replacement
      + deployment_targets = ["ou-xxxx-yyyyyyyy"]
    }

  # aws_cloudformation_stack_set_instance.resource_explorer["us-west-2"] must be replaced
  -/+ resource "aws_cloudformation_stack_set_instance" "resource_explorer" {
      ~ account_id = "123456789012" -> "210987654321" # forces replacement
      + deployment_targets = ["ou-xxxx-yyyyyyyy"]
    }

  # aws_cloudformation_stack_set_instance.resource_explorer["ap-northeast-1"] must be replaced
  -/+ resource "aws_cloudformation_stack_set_instance" "resource_explorer" {
      ~ account_id = "123456789012" -> "210987654321" # forces replacement
    }

  # module.vpc.aws_subnet.private["us-west-2"] must be replaced
  -/+ resource "aws_subnet" "private" {
      ~ cidr_block = "10.0.1.0/24" -> "10.0.10.0/24" # forces replacement
      ~ availability_zone = "us-west-2a" -> "us-west-2b"
    }

  # module.vpc.aws_subnet.private["ap-northeast-1"] must be replaced
  -/+ resource "aws_subnet" "private" {
      ~ cidr_block = "10.0.2.0/24" -> "10.0.20.0/24" # forces replacement
    }

  # module.app.module.ecs.aws_ecs_service.api must be replaced
  -/+ resource "aws_ecs_service" "api" {
      ~ task_definition = "arn:aws:ecs:us-east-1:123:task-def/api:41" -> "arn:aws:ecs:us-east-1:123:task-def/api:42" # forces replacement
      ~ desired_count   = 2 -> 3
    }

  # aws_iam_role.lambda_exec will be created
  + resource "aws_iam_role" "lambda_exec" {
      + name               = "lambda-exec-role"
      + assume_role_policy = jsonencode({
          Version = "2012-10-17"
          Statement = [
            {
              Effect    = "Allow"
              Principal = { Service = "lambda.amazonaws.com" }
              Action    = "sts:AssumeRole"
            },
          ]
        })
    }


  + resource "aws_route53_record" "web_dns" {
      + allow_overwrite = (known after apply)
      + fqdn            = (known after apply)
      + id              = (known after apply)
      + name            = "app.example.net"
      + records         = [
          + "192.0.2.1",
        ]
      + ttl             = 300
      + type            = "A"
      + zone_id         = "Z0123456789ABCDEF"
    }


  + resource "aws_s3_bucket" "logs" {
      + bucket = "my-app-logs-prod"
      + tags   = { "Env" = "prod" }
    }

  # aws_rds_cluster.main will be destroyed
  - resource "aws_rds_cluster" "main" {
      - cluster_identifier = "my-cluster"
      - engine             = "aurora-mysql"
      - engine_version     = "8.0.mysql_aurora.3.04.0"
    }

  # aws_lambda_function.api will be updated in-place
  ~ resource "aws_lambda_function" "api" {
      ~ timeout     = 30 -> 60
      ~ memory_size = 128 -> 256
    }

Plan: 6 to add, 1 to change, 5 to destroy.`;

let allResources = [];
let currentFilter = 'create';

function stripAnsi(str) {
  return str.replace(/\x1b\[[0-9;]*m/g, '');
}

function parsePlan(rawText) {
  const text = stripAnsi(rawText);
  const resources = [];
  const lines = text.split('\n');
  let i = 0;

  // ブロック内のdiff属性を収集する
  // op: '~'変更 '+'追加 '-'削除
  // 複数行にまたがる値（[ ... ] や { ... }）も1属性としてまとめる
  function parseAttrs(startLine, endLine) {
    const attrs = [];
    let k = startLine;

    // インデント深さを計算
    function indentOf(s) { return s.match(/^(\s*)/)[1].length; }

    // ブロック値（[, {で始まる）を複数行にわたって収集して1文字列にまとめる
    function collectBlock(firstVal, baseIndent, fromK) {
      // 開き括弧カウント
      let depth = 0;
      for (const ch of firstVal) { if (ch === '[' || ch === '{') depth++; if (ch === ']' || ch === '}') depth--; }
      if (depth <= 0) return { val: firstVal, nextK: fromK };
      let val = firstVal;
      let j = fromK;
      while (j < endLine && depth > 0) {
        const raw = lines[j];
        const trimmed = raw.trim();
        // strip leading op char (+/-/~) if same indent level
        const stripped = trimmed.replace(/^[+~\-]\s+/, '');
        val += ' ' + stripped;
        for (const ch of stripped) { if (ch === '[' || ch === '{') depth++; if (ch === ']' || ch === '}') depth--; }
        j++;
        if (depth <= 0) break;
      }
      return { val, nextK: j };
    }

    while (k < endLine) {
      const l = lines[k];
      // ~ key = "old" -> "new"
      const change = l.match(/^(\s+)~\s+(\S+)\s+=\s+(.+?)\s+->\s+(.+?)(?:\s+#.*)?$/);
      if (change) {
        attrs.push({ op: '~', key: change[2], from: change[3].trim(), to: change[4].trim() });
        k++; continue;
      }
      // + key = value  (単行 or ブロック開始)
      const add = l.match(/^(\s+)\+\s+(\S+)\s+=\s+(.+?)(?:\s+#.*)?$/);
      if (add && !l.match(/^\s+\+\s+resource\b/)) {
        const baseIndent = add[1].length;
        const firstVal = add[3].trim();
        if (/[\[{]/.test(firstVal)) {
          const { val, nextK } = collectBlock(firstVal, baseIndent, k + 1);
          attrs.push({ op: '+', key: add[2], val });
          k = nextK; continue;
        }
        attrs.push({ op: '+', key: add[2], val: firstVal });
        k++; continue;
      }
      // - key = value
      const del = l.match(/^(\s+)\-\s+(\S+)\s+=\s+(.+?)(?:\s+#.*)?$/);
      if (del && !l.match(/^\s+\-\s+resource\b/)) {
        const baseIndent = del[1].length;
        const firstVal = del[3].trim();
        if (/[\[{]/.test(firstVal)) {
          const { val, nextK } = collectBlock(firstVal, baseIndent, k + 1);
          attrs.push({ op: '-', key: del[2], val });
          k = nextK; continue;
        }
        attrs.push({ op: '-', key: del[2], val: firstVal });
        k++; continue;
      }
      k++;
    }
    return attrs;
  }

  // 次の # ヘッダーまでのブロック末尾行を返す
  function blockEnd(from) {
    let j = from;
    while (j < lines.length && !lines[j].trim().startsWith('# ')) j++;
    return j;
  }

  while (i < lines.length) {
    const line = lines[i].trim();
    const replaceMatch = line.match(/^#\s+(.+?)\s+(?:is tainted, so )?must be replaced$/);
    const createMatch  = line.match(/^#\s+(.+?)\s+will be created$/);
    const destroyMatch = line.match(/^#\s+(.+?)\s+will be destroyed$/);
    const updateMatch  = line.match(/^#\s+(.+?)\s+will be updated in-place$/);

    if (replaceMatch) {
      const name = replaceMatch[1];
      const isTainted = line.includes('is tainted');
      const reasons = isTainted ? ['tainted'] : [];
      const end = blockEnd(i + 1);
      for (let j = i + 1; j < end; j++) {
        if (lines[j].includes('# forces replacement')) {
          const attr = lines[j].trim().match(/~\s+(\S+)\s*=/);
          if (attr) reasons.push(attr[1]);
        }
      }
      const attrs = parseAttrs(i + 1, end);
      resources.push({ type: 'replace', name, reasons, attrs });
      i = end;
    } else if (createMatch) {
      const end = blockEnd(i + 1);
      const attrs = parseAttrs(i + 1, end);
      resources.push({ type: 'create', name: createMatch[1], reasons: [], attrs });
      i = end;
    } else if (destroyMatch) {
      const end = blockEnd(i + 1);
      const attrs = parseAttrs(i + 1, end);
      resources.push({ type: 'destroy', name: destroyMatch[1], reasons: [], attrs });
      i = end;
    } else if (updateMatch) {
      const end = blockEnd(i + 1);
      const attrs = parseAttrs(i + 1, end);
      resources.push({ type: 'update', name: updateMatch[1], reasons: [], attrs });
      i = end;
    } else {
      i++;
    }
  }
  return resources;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// "module.foo.module.bar.aws_instance.web["us-west-2"][0]" を分解
// ["key"] の中にドットが入るケースを考慮し、まず末尾の [...] を全部剥がしてから
// ドット分割する
function parseResourceName(raw) {
  // 末尾の連続する [...] を全部取り出す (例: ["us-west-2"][0] → ['"us-west-2"', '0'])
  const indexes = [];
  let s = raw;
  const idxRe = /(\[[^\]]*\])$/;
  let m;
  while ((m = s.match(idxRe))) {
    indexes.unshift(m[1]);
    s = s.slice(0, -m[1].length);
  }
  // 残った s をドット分割 (["..."] は除去済みなので安全)
  const parts = s.split('.');
  const modules = [];
  let i = 0;
  while (i < parts.length - 2) {
    if (parts[i] === 'module') {
      modules.push(parts[i + 1]);
      i += 2;
    } else {
      break;
    }
  }
  const rtype = parts[i]     || '';
  const rname = parts[i + 1] || '';
  return { modules, rtype, rname, indexes };
}

function resourceTreeHtml(raw) {
  const { modules, rtype, rname, indexes } = parseResourceName(raw);
  const hasIndex = indexes.length > 0;
  const depth = modules.length;

  // module 行: module > foo > bar のように > でつなぐ
  const modLines = modules.map((mod, mi) => {
    const pad = '  '.repeat(mi);
    return `<div class="res-module"><span class="res-indent-pad">${esc(pad)}</span><span class="mod-kw">module</span><span class="res-dot">.</span><span class="mod-seg">${esc(mod)}</span></div>`;
  }).join('');

  // リソース行
  const resIndent = depth > 0 ? `<span class="res-indent">${'  '.repeat(depth - 1)}└ </span>` : '';
  const indexHtml = indexes.map(idx => `<span class="res-index">${esc(idx)}</span>`).join('');
  // indexがある場合は rname のあとに改行して字下げ表示
  let leafHtml;
  if (hasIndex) {
    const idxIndent = '  '.repeat(depth) + '  ';
    leafHtml = `<div class="res-leaf">${resIndent}<span class="res-rtype">${esc(rtype)}</span><span class="res-dot">.</span><span class="res-rname">${esc(rname)}</span></div>`
             + `<div class="res-leaf-index"><span class="res-indent-pad">${esc(idxIndent)}</span>${indexHtml}</div>`;
  } else {
    leafHtml = `<div class="res-leaf">${resIndent}<span class="res-rtype">${esc(rtype)}</span><span class="res-dot">.</span><span class="res-rname">${esc(rname)}</span></div>`;
  }
  return `<div class="res-tree">${modLines}${leafHtml}</div>`;
}

let expandMode = false;

// (known after apply) を ...? に正規化
function normalizeVal(v) {
  return v.replace(/\(known after apply\)/g, '...?').trim();
}

// HCL値をトークン列にパース → ツリーHTML化
function hclTreeHtml(raw, op, depth) {
  const v = normalizeVal(raw.trim());

  function scalarSpan(text, o) {
    const t = normalizeVal(text.trim()).replace(/,\s*$/, '');
    if (t === '...?') return `<span class="attr-unknown">...?</span>`;
    if (o === '+') return `<span class="attr-to">${esc(t)}</span>`;
    if (o === '-') return `<span class="attr-from">${esc(t)}</span>`;
    return `<span class="attr-val">${esc(t)}</span>`;
  }

  function stripJsonencode(s) {
    const m = s.match(/^jsonencode\(([\s\S]+)\)$/s);
    return m ? m[1].trim() : null;
  }

  function tokenize(src) {
    const tokens = [];
    let i = 0;
    while (i < src.length) {
      if (/\s/.test(src[i])) { i++; continue; }
      if ('{}[]'.includes(src[i])) { tokens.push({ type: src[i], val: src[i] }); i++; continue; }
      if (src[i] === ',') { tokens.push({ type: ',', val: ',' }); i++; continue; }
      if ((src[i] === '=' && src[i+1] !== '>') || src[i] === ':') { tokens.push({ type: '=', val: '=' }); i++; continue; }
      if (src[i] === '"') {
        let j = i + 1, s = '';
        while (j < src.length && src[j] !== '"') {
          if (src[j] === '\\') { s += src[j+1]; j += 2; } else { s += src[j++]; }
        }
        tokens.push({ type: 'str', val: s }); i = j + 1; continue;
      }
      let j = i;
      while (j < src.length && !/[\s{}\[\],=:"']/.test(src[j])) j++;
      if (j > i) { tokens.push({ type: 'word', val: src.slice(i, j) }); i = j; continue; }
      i++;
    }
    return tokens;
  }

  function parse(tokens, pos) {
    if (pos >= tokens.length) return { node: null, pos };
    const t = tokens[pos];
    if (t.type === '{') {
      const entries = []; pos++; // use array to preserve order & allow duplicate keys
      while (pos < tokens.length && tokens[pos].type !== '}') {
        let key;
        if (tokens[pos].type === 'str' || tokens[pos].type === 'word') { key = tokens[pos].val; pos++; }
        else { pos++; continue; }
        if (pos < tokens.length && tokens[pos].type === '=') pos++;
        const { node, pos: np } = parse(tokens, pos); pos = np;
        entries.push([key, node]);
        if (pos < tokens.length && tokens[pos].type === ',') pos++;
      }
      if (pos < tokens.length) pos++; // consume }
      return { node: { __entries: entries }, pos };
    }
    if (t.type === '[') {
      const arr = []; pos++;
      while (pos < tokens.length && tokens[pos].type !== ']') {
        const { node, pos: np } = parse(tokens, pos); pos = np;
        arr.push(node);
        if (pos < tokens.length && tokens[pos].type === ',') pos++;
      }
      if (pos < tokens.length) pos++; // consume ]
      return { node: arr, pos };
    }
    if (t.type === 'str') return { node: `"${t.val}"`, pos: pos + 1 };
    if (t.type === 'word') return { node: t.val, pos: pos + 1 };
    return { node: null, pos: pos + 1 };
  }

  function astToHtml(node, d, o) {
    const ind = '  '.repeat(d);
    const cind = '  '.repeat(d + 1);
    if (node === null || node === undefined) return scalarSpan('null', o);
    if (typeof node === 'string') return scalarSpan(node, o);
    if (Array.isArray(node)) {
      if (node.length === 0) return `<span class="attr-bracket">[]</span>`;
      const items = node.map(n =>
        `<div class="attr-hcl-line"><span class="attr-hcl-pad">${esc(cind)}</span>${astToHtml(n, d + 1, o)}</div>`
      ).join('');
      return `<span class="attr-bracket">[</span>${items}<div class="attr-hcl-line"><span class="attr-hcl-pad">${esc(ind)}</span><span class="attr-bracket">]</span></div>`;
    }
    if (node.__entries) {
      const entries = node.__entries;
      if (entries.length === 0) return `<span class="attr-bracket">{}</span>`;
      const lines = entries.map(([k, v]) => {
        const vHtml = astToHtml(v, d + 1, o);
        return `<div class="attr-hcl-line"><span class="attr-hcl-pad">${esc(cind)}</span><span class="attr-hcl-key">${esc(k)}</span><span class="attr-hcl-eq"> = </span>${vHtml}</div>`;
      }).join('');
      return `<span class="attr-bracket">{</span>${lines}<div class="attr-hcl-line"><span class="attr-hcl-pad">${esc(ind)}</span><span class="attr-bracket">}</span></div>`;
    }
    return scalarSpan(String(node), o);
  }

  function renderVal(s, o) {
    const inner = stripJsonencode(s);
    const src = inner !== null ? inner : s;
    if (src.trim().startsWith('{') || src.trim().startsWith('[') || inner !== null) {
      try {
        const tokens = tokenize(src);
        const { node } = parse(tokens, 0);
        if (node !== null) return astToHtml(node, depth, o);
      } catch(e) { /* fallback */ }
    }
    return scalarSpan(s, o);
  }

  return renderVal(v, op);
}

// tags/tags_all かどうか判定
function isTagKey(key) { return key === 'tags' || key === 'tags_all'; }

function attrBlockHtml(attrs) {
  if (!attrs || attrs.length === 0) return '';
  const rows = attrs.map(a => {
    const tagBadge = isTagKey(a.key) ? `<span class="attr-tag-badge">tag</span>` : '';
    if (a.op === '~') {
      const isForced = a.to && a.to.includes('forces replacement');
      const toClean = isForced ? a.to.replace(/\s*#\s*forces replacement.*$/, '').trim() : a.to;
      return `<div class="attr-row">
        ${tagBadge}<span class="attr-key">${esc(a.key)}</span>
        ${hclTreeHtml(a.from, '-', 1)}
        <span class="attr-arrow">→</span>
        ${hclTreeHtml(toClean, '+', 1)}
        ${isForced ? '<span class="attr-forces">forces replacement</span>' : ''}
      </div>`;
    } else if (a.op === '+') {
      return `<div class="attr-row">
        ${tagBadge}<span class="attr-key">${esc(a.key)}</span>
        ${hclTreeHtml(a.val, '+', 1)}
      </div>`;
    } else {
      return `<div class="attr-row">
        ${tagBadge}<span class="attr-key">${esc(a.key)}</span>
        ${hclTreeHtml(a.val, '-', 1)}
      </div>`;
    }
  }).join('');
  return `<div class="attr-block${expandMode ? ' visible' : ''}">${rows}</div>`;
}

function renderResources(filter) {
  const list = document.getElementById('resource-list');
  const items = filter === 'all' ? allResources : allResources.filter(r => r.type === filter);
  if (items.length === 0) {
    list.innerHTML = '<div class="empty-state">// 該当なし</div>';
    return;
  }

  // 3段階グループ化: module path → resource type → resource name
  // nameグループに attrs も収集
  const modGroups = new Map();
  for (const r of items) {
    const parsed = parseResourceName(r.name);
    const modKey  = parsed.modules.join('\0');
    const typeKey = parsed.rtype;
    const nameKey = parsed.rname;
    if (!modGroups.has(modKey)) modGroups.set(modKey, { modules: parsed.modules, typeGroups: new Map() });
    const tg = modGroups.get(modKey).typeGroups;
    if (!tg.has(typeKey)) tg.set(typeKey, new Map());
    const ng = tg.get(typeKey);
    if (!ng.has(nameKey)) ng.set(nameKey, { opType: r.type, reasons: r.reasons, indexes: [], attrs: r.attrs || [] });
    const ng_entry = ng.get(nameKey);
    if (parsed.indexes.length > 0) {
      ng_entry.indexes.push({ idx: parsed.indexes.join(''), opType: r.type, reasons: r.reasons, attrs: r.attrs || [] });
    }
  }

  let html = '';
  for (const [modKey, modGroup] of modGroups) {
    if (modKey === '') {
      html += `<div class="grp-header grp-header-root"><span class="grp-root">(root)</span></div>`;
    } else {
      const modLines = modGroup.modules.map((mod, mi) => {
        const pad = '  '.repeat(mi);
        return `<div class="grp-mod-line"><span class="grp-pad">${pad}</span><span class="mod-kw">module</span><span class="res-dot">.</span><span class="mod-seg">${esc(mod)}</span></div>`;
      }).join('');
      html += `<div class="grp-header">${modLines}</div>`;
    }

    const modDepth = modGroup.modules.length;

    for (const [rtype, nameGroups] of modGroup.typeGroups) {
      const typeIndent = '  '.repeat(modDepth);
      html += `<div class="grp-type-header"><span class="grp-pad">${esc(typeIndent)}</span><span class="res-rtype">${esc(rtype)}</span></div>`;
      html += `<div class="grp-body">`;

      for (const [rname, entry] of nameGroups) {
        const nameIndent = '  '.repeat(modDepth) + '└ ';
        const hasIndexes = entry.indexes.length > 0;
        const reasonHtml = !hasIndexes && entry.reasons.length
          ? `<div class="resource-reason">forces replacement: ${entry.reasons.map(x => `<span>${esc(x)}</span>`).join(', ')}</div>`
          : '';

        if (!hasIndexes) {
          html += `<div class="grp-item">
            <div class="grp-item-name">
              <div class="res-leaf"><span class="res-indent">${esc(nameIndent)}</span><span class="res-rname">${esc(rname)}</span></div>
              ${reasonHtml}
              ${attrBlockHtml(entry.attrs)}
            </div>
          </div>`;
        } else {
          const idxIndent = '  '.repeat(modDepth) + '    ';
          const indexRows = entry.indexes.map(({ idx, reasons, attrs }) => {
            const reasonSub = reasons.length
              ? `<div class="resource-reason">forces replacement: ${reasons.map(x => `<span>${esc(x)}</span>`).join(', ')}</div>`
              : '';
            return `<div class="grp-item grp-item-index">
              <div class="grp-item-name">
                <div class="res-leaf"><span class="res-indent">${esc(idxIndent)}</span><span class="res-index">${esc(idx)}</span></div>
                ${reasonSub}
                ${attrBlockHtml(attrs)}
              </div>
            </div>`;
          }).join('');
          html += `<div class="grp-item grp-item-name-header">
            <div class="grp-item-name">
              <div class="res-leaf"><span class="res-indent">${esc(nameIndent)}</span><span class="res-rname">${esc(rname)}</span></div>
            </div>
          </div>${indexRows}`;
        }
      }
      html += `</div>`;
    }
  }
  list.innerHTML = html;
}

function analyze() {
  const text = document.getElementById('plan-input').value;
  if (!text.trim()) return;
  allResources = parsePlan(text);
  document.getElementById('cnt-replace').textContent = allResources.filter(r => r.type === 'replace').length;
  document.getElementById('cnt-create').textContent  = allResources.filter(r => r.type === 'create').length;
  document.getElementById('cnt-destroy').textContent = allResources.filter(r => r.type === 'destroy').length;
  document.getElementById('cnt-update').textContent  = allResources.filter(r => r.type === 'update').length;
  document.getElementById('results').classList.add('visible');
  renderResources(currentFilter);
}

// Drop zone
document.getElementById('drop-zone').addEventListener('click', () => {
  document.getElementById('plan-input').classList.add('visible');
  document.getElementById('plan-input').focus();
});
document.getElementById('drop-zone').addEventListener('dragover', e => {
  e.preventDefault();
  document.getElementById('drop-zone').classList.add('drag-over');
});
document.getElementById('drop-zone').addEventListener('dragleave', () => {
  document.getElementById('drop-zone').classList.remove('drag-over');
});
document.getElementById('drop-zone').addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('plan-input').value = ev.target.result;
    document.getElementById('plan-input').classList.add('visible');
    analyze();
  };
  reader.readAsText(file);
});

document.getElementById('analyze-btn').addEventListener('click', analyze);

document.getElementById('sample-btn').addEventListener('click', () => {
  document.getElementById('plan-input').value = SAMPLE;
  document.getElementById('plan-input').classList.add('visible');
  analyze();
});

document.getElementById('clear-btn').addEventListener('click', () => {
  document.getElementById('plan-input').value = '';
  document.getElementById('plan-input').classList.remove('visible');
  document.getElementById('results').classList.remove('visible');
  allResources = [];
});

document.getElementById('filter-row').addEventListener('click', e => {
  const btn = e.target.closest('[data-filter]');
  if (!btn) return;
  currentFilter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === currentFilter));
  renderResources(currentFilter);
});

document.getElementById('expand-btn').addEventListener('click', () => {
  expandMode = !expandMode;
  const btn = document.getElementById('expand-btn');
  btn.textContent = expandMode ? '⊟ 属性を閉じる' : '⊞ 属性展開';
  btn.style.color = expandMode ? 'var(--c-update)' : '';
  btn.style.borderColor = expandMode ? 'var(--c-update)' : '';
  document.querySelectorAll('.attr-block').forEach(el => el.classList.toggle('visible', expandMode));
});
</script>
</body>
