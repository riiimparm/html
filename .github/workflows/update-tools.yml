name: Update tools.json

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-tools:
    runs-on: ubuntu-latest

    steps:
      - name: Verify pusher
        run: |
          ALLOWED_USERS="riiimparm"

          if ! echo "$ALLOWED_USERS" | grep -w "${{ github.actor }}"; then
            echo "Unauthorized pusher: ${{ github.actor }}"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate tools.json
        run: |
          node .github/scripts/generate-tools.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add tools.json

          git diff --cached --quiet && exit 0

          git commit -m "auto: update tools.json"
          git push